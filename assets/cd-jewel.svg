<svg xmlns="http://www.w3.org/2000/svg" width="560" height="340" viewBox="0 0 560 340">
  <defs>
    <radialGradient id="disc" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e8e8"/>
      <stop offset="35%" stop-color="#c0c0c0"/>
      <stop offset="60%" stop-color="#909090"/>
      <stop offset="75%" stop-color="#606060"/>
      <stop offset="90%" stop-color="#404040"/>
      <stop offset="100%" stop-color="#202020"/>
    </radialGradient>
    <radialGradient id="disc-shine" cx="35%" cy="35%" r="60%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.3)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.1)"/>
    </radialGradient>
    <linearGradient id="case-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.08)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.05)"/>
    </linearGradient>
    <linearGradient id="insert-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- case shadow -->
  <rect x="22" y="22" width="520" height="300" rx="8" fill="rgba(0,0,0,0.4)"/>

  <!-- case outer -->
  <rect x="20" y="20" width="520" height="300" rx="6" fill="rgba(40,40,45,0.3)" stroke="rgba(200,200,200,0.25)" stroke-width="1.5"/>

  <!-- case glass overlay -->
  <rect x="20" y="20" width="520" height="300" rx="6" fill="url(#case-grad)"/>

  <!-- spine text -->
  <text x="30" y="175" fill="#00ff41" font-family="monospace" font-size="11" transform="rotate(-90,30,175)" opacity="0.7" letter-spacing="3">3CH0LESS</text>

  <!-- insert area -->
  <rect x="42" y="30" width="246" height="280" rx="2" fill="url(#insert-bg)"/>

  <!-- insert border -->
  <rect x="42" y="30" width="246" height="280" rx="2" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.3"/>

  <!-- DISC SIDE -->
  <!-- disc tray circle subtle -->
  <circle cx="355" cy="165" r="95" fill="rgba(30,30,35,0.5)"/>

  <!-- CD disc -->
  <circle cx="355" cy="165" r="85" fill="url(#disc)" stroke="#333" stroke-width="0.5"/>
  <circle cx="355" cy="165" r="85" fill="url(#disc-shine)"/>

  <!-- cd hub ring -->
  <circle cx="355" cy="165" r="18" fill="#2a2a2a" stroke="#444" stroke-width="0.5"/>
  <circle cx="355" cy="165" r="8" fill="#1a1a1a"/>

  <!-- matrix ring on disc -->
  <circle cx="355" cy="165" r="65" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.15"/>
  <circle cx="355" cy="165" r="60" fill="none" stroke="#00ff41" stroke-width="0.3" opacity="0.1"/>

  <!-- disc label text -->
  <text x="355" y="120" fill="#00ff41" font-family="monospace" font-size="14" font-weight="bold" text-anchor="middle" filter="url(#glow)">3CH0LESS</text>
  <text x="355" y="140" fill="#00ff41" font-family="monospace" font-size="9" text-anchor="middle" opacity="0.7">REVERSER</text>
  <text x="355" y="200" fill="#00ff41" font-family="monospace" font-size="7" text-anchor="middle" opacity="0.4">2026  MADE IN MATRIX</text>

  <!-- INLAY - TRACKLIST -->
  <text x="55" y="55" fill="#00ff41" font-family="monospace" font-size="9" font-weight="bold" filter="url(#glow)">TRACKLIST</text>
  <line x1="55" y1="60" x2="275" y2="60" stroke="#00ff41" stroke-width="0.5" opacity="0.5"/>

  <text x="55" y="78" fill="#c9d1d9" font-family="monospace" font-size="8">01. FIREWALL BYP*SS  [3:47]</text>
  <text x="55" y="93" fill="#c9d1d9" font-family="monospace" font-size="8">02. MAINFRAME CONN  [4:12]</text>
  <text x="55" y="108" fill="#c9d1d9" font-family="monospace" font-size="8">03. CAFFEINE_CRIT  [2:58]</text>
  <text x="55" y="123" fill="#c9d1d9" font-family="monospace" font-size="8">04. ACCESS ADMIN   [5:01]</text>
  <text x="55" y="138" fill="#c9d1d9" font-family="monospace" font-size="8">05. BINARY D*MP    [3:33]</text>
  <text x="55" y="153" fill="#c9d1d9" font-family="monospace" font-size="8">06. HEX DREAMING   [4:45]</text>

  <!-- barcode -->
  <g transform="translate(55, 230)">
    <rect x="0" y="0" width="2" height="30" fill="#c9d1d9"/>
    <rect x="4" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="7" y="0" width="3" height="30" fill="#c9d1d9"/>
    <rect x="12" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="15" y="0" width="2" height="30" fill="#c9d1d9"/>
    <rect x="19" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="22" y="0" width="4" height="30" fill="#c9d1d9"/>
    <rect x="28" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="31" y="0" width="2" height="30" fill="#c9d1d9"/>
    <rect x="35" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="38" y="0" width="3" height="30" fill="#c9d1d9"/>
    <rect x="43" y="0" width="2" height="30" fill="#c9d1d9"/>
    <rect x="47" y="0" width="1" height="30" fill="#c9d1d9"/>
    <rect x="50" y="0" width="2" height="30" fill="#c9d1d9"/>
    <text x="0" y="42" fill="#c9d1d9" font-family="monospace" font-size="6">3CH0-2026-REV</text>
  </g>

  <!-- parental advisory -->
  <g transform="translate(210, 185)">
    <rect x="0" y="0" width="55" height="50" rx="3" fill="none" stroke="#c9d1d9" stroke-width="1.5"/>
    <text x="27" y="15" fill="#c9d1d9" font-family="monospace" font-size="5" text-anchor="middle" font-weight="bold">PARENTAL</text>
    <text x="27" y="23" fill="#c9d1d9" font-family="monospace" font-size="5" text-anchor="middle" font-weight="bold">ADVISORY</text>
    <text x="27" y="35" fill="#c9d1d9" font-family="monospace" font-size="4" text-anchor="middle">EXPLICIT</text>
    <text x="27" y="43" fill="#c9d1d9" font-family="monospace" font-size="4" text-anchor="middle">CONTENT</text>
  </g>

  <!-- case reflection highlights -->
  <rect x="20" y="20" width="520" height="3" rx="1" fill="rgba(255,255,255,0.06)"/>
  <rect x="20" y="317" width="520" height="3" rx="1" fill="rgba(0,0,0,0.3)"/>
</svg>
