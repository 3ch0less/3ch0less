<svg xmlns="http://www.w3.org/2000/svg" width="750" height="30" viewBox="0 0 750 30">
  <defs>
    <linearGradient id="line-grad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="transparent"/>
      <stop offset="15%" stop-color="#00ff41" stop-opacity="0.1"/>
      <stop offset="50%" stop-color="#00ff41" stop-opacity="0.8"/>
      <stop offset="85%" stop-color="#00ff41" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="transparent"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="14" width="750" height="2" rx="1" fill="url(#line-grad)" filter="url(#glow)">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="3s" repeatCount="indefinite"/>
  </rect>

  <rect x="0" y="14" width="30" height="2" rx="1" fill="#00ff41" opacity="0.9">
    <animate attributeName="x" values="-30;750" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.9;0.9;0" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
